<style>
:root{
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --paper:#F5F5F3;
  --card:#FFFFFF;
  --ink:#16171B;
  --ink-soft:#5E6066;
  --ink-faint:#9B9CA2;
  --line:#E3E2DE;
  --line-soft:#EDECE9;
  --ok:#16171B;
  --accent:#16171B;
  --accent-tint:#EFEEEB;
  --display:"Georgia","Times New Roman",serif;
  --radius:18px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;}
#app{max-width:520px;margin:0 auto;min-height:100dvh;
  padding:calc(var(--safe-top) + 10px) 18px calc(92px + var(--safe-bot));}
h1,h2,h3{margin:0;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.brand{font-family:var(--display);font-weight:700;font-size:30px;letter-spacing:-.01em;}
.iconbtn{background:none;border:none;font-size:20px;color:var(--ink-soft);cursor:pointer;padding:6px;}
.page-title{font-family:var(--display);font-weight:700;font-size:28px;letter-spacing:-.01em;}
.page-sub{color:var(--ink-soft);font-size:14.5px;margin:4px 0 18px;}
.ph-title{font-family:var(--display);font-weight:700;font-size:24px;display:flex;align-items:center;gap:9px;}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 10px;}
.back{background:none;border:none;color:var(--ink-soft);font-size:15px;cursor:pointer;padding:6px 0;margin-bottom:6px;}
.flag{font-size:30px;line-height:1;}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;background:var(--accent-tint);color:var(--ink);font-size:12px;font-weight:700;}

.btn{display:block;width:100%;text-align:center;background:var(--ink);color:#fff;border:none;border-radius:13px;
  padding:14px;font-size:15.5px;font-weight:600;cursor:pointer;text-decoration:none;}
.btn.soft{background:var(--accent-tint);color:var(--ink);}
.btn.ghost{background:none;border:1px solid var(--line);color:var(--ink);}
.btn.sm{padding:9px 12px;font-size:13.5px;border-radius:10px;}
.btn:active{opacity:.85;}
.row{display:flex;gap:8px;}
.row .btn{flex:1;}

.streak-row{display:flex;align-items:center;justify-content:space-between;gap:14px;background:var(--card);
  border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px;cursor:pointer;}
.streak-num{font-family:var(--display);font-weight:700;font-size:34px;line-height:1;}
.streak-lbl{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
.week-strip{display:flex;gap:7px;}
.wd{display:flex;flex-direction:column;align-items:center;gap:5px;}
.wd i{width:9px;height:9px;border-radius:50%;background:var(--line);display:block;}
.wd.met i{background:var(--ink);}
.wd.today i{box-shadow:0 0 0 2px var(--paper),0 0 0 4px var(--ink);}
.wd span{font-size:9.5px;color:var(--ink-faint);}

.task{display:flex;align-items:center;gap:12px;width:100%;background:var(--card);border:1px solid var(--line);
  border-radius:13px;padding:13px 14px;margin-bottom:9px;cursor:pointer;text-align:left;}
.task .tk-ic{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--line);display:flex;
  align-items:center;justify-content:center;font-size:16px;flex:0 0 auto;}
.task.done .tk-ic{background:var(--ink);color:#fff;border-color:var(--ink);}
.tk-t{font-weight:600;font-size:15px;}
.tk-d{font-size:12.5px;color:var(--ink-soft);}
.tk-go{margin-left:auto;color:var(--ink-faint);font-size:20px;}

.module-head{font-family:var(--display);font-weight:700;font-size:17px;margin:24px 2px 10px;}
.unit{display:flex;align-items:center;gap:12px;width:100%;background:var(--card);border:1px solid var(--line);
  border-radius:13px;padding:12px 14px;margin-bottom:8px;cursor:pointer;text-align:left;}
.unit.done{opacity:.62;}
.unit-num{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--line);display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:700;flex:0 0 auto;}
.unit.done .unit-num{background:var(--ink);color:#fff;border-color:var(--ink);}
.unit-title{font-weight:600;font-size:14.5px;}
.unit-can{font-size:12px;color:var(--ink-soft);}
.unit-state{margin-left:auto;color:var(--ink-faint);}
.mod-toggle{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;cursor:pointer;
  padding:8px 2px;text-align:left;}
.mod-toggle .mt-name{font-family:var(--display);font-weight:700;font-size:16px;flex:1;}
.mod-toggle .mt-x{color:var(--ink-faint);font-size:13px;}

.word{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--line-soft);}
.word:last-child{border-bottom:none;}
.word b{font-weight:600;}
.word span{color:var(--ink-soft);text-align:right;}

.brief-prompt{background:var(--accent-tint);border-radius:12px;padding:14px;font-size:14.5px;line-height:1.5;white-space:pre-wrap;}
.success li{margin-bottom:5px;}

input,textarea,select{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font:inherit;
  font-size:15px;background:var(--card);color:var(--ink);box-sizing:border-box;}
textarea{resize:vertical;}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--ink);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--ink-soft);margin-bottom:6px;}
.hint{font-size:12.5px;color:var(--ink-faint);line-height:1.45;}
.seg{display:flex;flex-wrap:wrap;gap:6px;}
.seg button{flex:1 1 28%;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 6px;
  font-size:13px;font-weight:600;color:var(--ink-soft);cursor:pointer;}
.seg button.on{background:var(--ink);color:#fff;border-color:var(--ink);}

.loading{display:flex;flex-direction:column;align-items:center;gap:14px;padding:60px 0;color:var(--ink-soft);}
.spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--ink);border-radius:50%;animation:sp 1s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.err{background:var(--accent-tint);border-radius:12px;padding:14px;color:var(--ink-soft);font-size:14px;}

.toast{position:fixed;left:50%;bottom:calc(96px + var(--safe-bot));transform:translateX(-50%) translateY(12px);
  background:var(--ink);color:#fff;padding:11px 18px;border-radius:999px;font-size:14px;opacity:0;transition:all .25s;
  pointer-events:none;z-index:80;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:50;display:flex;background:var(--card);
  border-top:1px solid var(--line);padding:6px 4px calc(6px + var(--safe-bot));max-width:520px;margin:0 auto;}
.tab{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:5px 2px;color:var(--ink-faint);cursor:pointer;font:inherit;min-width:0;}
.tab .tab-ic{height:22px;display:flex;align-items:center;justify-content:center;font-size:19px;line-height:1;}
.tab .tab-lb{font-size:10.5px;font-weight:600;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tab.on{color:var(--ink);}
.tab.on .tab-lb{font-weight:800;}

.song-seg .song-line{display:flex;align-items:center;justify-content:space-between;gap:10px;font-weight:600;font-size:15px;}
.song-de{color:var(--ink-soft);font-size:14px;margin-top:5px;}
.song-vocab{margin-top:10px;border-top:1px solid var(--line-soft);padding-top:6px;}
.song-gram,.song-context{margin-top:8px;font-size:13.5px;color:var(--ink-soft);line-height:1.5;}
.song-context{border-top:1px solid var(--line-soft);padding-top:8px;}
.song-gram b,.song-context b{color:var(--ink);margin-right:4px;}
@media (prefers-reduced-motion: reduce){*{animation-duration:.001ms !important;}}

/* Lernpfad */
.lvl-band{display:flex;align-items:center;gap:10px;margin:22px 0 12px;}
.lvl-band .lvl-chip{font-family:var(--display);font-weight:700;font-size:20px;}
.lvl-band .lvl-meta{font-size:11px;color:var(--ink-faint);font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.lvl-band .lvl-line{flex:1;height:1px;background:var(--line);}
.pstation{display:flex;gap:14px;align-items:stretch;width:100%;background:none;border:none;padding:0;text-align:left;cursor:pointer;font:inherit;color:inherit;}
.prail{position:relative;width:42px;flex:0 0 42px;display:flex;justify-content:center;}
.prail::before{content:"";position:absolute;top:0;bottom:0;width:2px;background:var(--line);}
.pstation:first-child .prail::before{top:26px;}
.pnode{position:relative;z-index:1;width:40px;height:40px;border-radius:50%;background:var(--card);border:2px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;margin-top:6px;color:var(--ink);}
.pstation.done .pnode{background:var(--ink);color:#fff;border-color:var(--ink);}
.pstation.active .pnode{border-color:var(--ink);box-shadow:0 0 0 5px var(--accent-tint);}
.pstation.locked .pnode{color:var(--ink-faint);background:var(--paper);}
.pcard{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin-bottom:11px;}
.pstation.active .pcard{border-color:var(--ink);}
.pstation.locked{cursor:default;}
.pstation.locked .pcard{opacity:.6;}
.pcard .pc-t{font-weight:700;font-size:15.5px;}
.pcard .pc-d{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
.pcard .pc-meta{font-size:11.5px;color:var(--ink-faint);margin-top:6px;}
.milestone{display:flex;gap:14px;align-items:center;width:100%;}
.milestone .prail{position:relative;width:42px;flex:0 0 42px;display:flex;justify-content:center;}
.milestone .prail::before{content:"";position:absolute;top:0;bottom:0;width:2px;background:var(--line);}
.mnode{position:relative;z-index:1;width:30px;height:30px;background:var(--paper);border:2px solid var(--line);
  transform:rotate(45deg);display:flex;align-items:center;justify-content:center;}
.milestone.reached .mnode{background:var(--ink);border-color:var(--ink);}
.mnode span{transform:rotate(-45deg);font-size:14px;color:#fff;}
.milestone .ms-t{font-size:13px;font-weight:700;color:var(--ink-soft);}
.milestone.reached .ms-t{color:var(--ink);}

/* Einstufungstest */
.q-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:12px;}
.q-card .q-txt{font-weight:600;margin-bottom:10px;}
.q-opt{display:block;width:100%;text-align:left;background:var(--paper);border:1px solid var(--line);border-radius:10px;
  padding:11px 13px;margin-bottom:7px;font:inherit;font-size:14.5px;cursor:pointer;color:var(--ink);}
.q-opt.sel{background:var(--ink);color:#fff;border-color:var(--ink);}

</style>

<body>
<div id="app"></div>
<nav id="tabbar" class="tabbar" style="display:none"></nav>

<script>
"use strict";

/* =========================================================
   Konfiguration
   ========================================================= */
const STORE_KEY = "lernplanState_v1";
const LANG_CONFIG = {
  es: { name:"Spanisch",    flag:"🇪🇸", aiName:"Spanisch",    defLevel:"A2" },
  fr: { name:"Französisch", flag:"🇫🇷", aiName:"Französisch", defLevel:"A1" },
  sv: { name:"Schwedisch",  flag:"🇸🇪", aiName:"Schwedisch",  defLevel:"B1" },
};
const LEVELS = ["A1","A2","B1","B2","C1","C2"];
const PLAN_MODULES = 12;     // Module pro Sprache
const UNITS_PER_MODULE = 7;  // Einheiten pro Modul

let ALLTAG = "";
const REGISTERS = {
  neutral:{ label:"Neutral", gen:"Verwende natürliche Standardsprache, klar und korrekt." },
  alltag: { label:"Alltag",  gen:"Verwende natürliche, alltagsnahe Umgangssprache, wie Muttersprachler im echten Alltag sprechen. Häufige, praktische Wörter und typische Wendungen." },
  locker: { label:"Locker",  gen:"Verwende lockere, sehr umgangssprachliche Sprache mit typischen Wendungen und Kurzformen, wie unter Freunden." },
};
function registerKey(){ return (state.settings && state.settings.register) || "alltag"; }
function applyRegister(){ ALLTAG = "WICHTIG: " + (REGISTERS[registerKey()]||REGISTERS.alltag).gen + " Wähle Themen und Beispiele aus dem echten täglichen Leben."; }

/* =========================================================
   State
   ========================================================= */
let state, view = { name:"home" };

function defaultState(){
  const langs = {};
  Object.keys(LANG_CONFIG).forEach(c=>{
    langs[c] = { level:LANG_CONFIG[c].defLevel, plan:null, units:{}, briefs:{}, progress:{}, custom:[] };
  });
  return {
    settings:{ endpoint:"https://api.anthropic.com/v1/messages", model:"claude-sonnet-4-6", register:"alltag", languaUrl:"" },
    langs,
    routine:{ langs:Object.keys(LANG_CONFIG), focusMode:"rotate" },
    streak:{ current:0, longest:0, lastDate:null },
    daily:null,
    history:{}
  };
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){ const s = JSON.parse(raw); return migrate(s); }
  }catch(e){}
  return defaultState();
}
function migrate(s){
  const d = defaultState();
  s.settings = Object.assign(d.settings, s.settings||{});
  s.routine = Object.assign(d.routine, s.routine||{});
  s.streak = s.streak || d.streak;
  s.history = s.history || {};
  s.langs = s.langs || d.langs;
  Object.keys(LANG_CONFIG).forEach(c=>{
    s.langs[c] = Object.assign({ level:LANG_CONFIG[c].defLevel, plan:null, units:{}, briefs:{}, progress:{}, custom:[] }, s.langs[c]||{});
  });
  return s;
}
function saveState(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){} }
state = loadState();

/* =========================================================
   Helfer
   ========================================================= */
function app(){ return document.getElementById("app"); }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function L(c){ return Object.assign({}, LANG_CONFIG[c], state.langs[c]); }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function loadingHTML(msg){ return `<div class="loading"><div class="spin"></div><div>${esc(msg)}</div></div>`; }
function todayStr(d){ d=d||new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function dateFromStr(s){ const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); }
let toastT;
function toast(msg){
  let t = document.querySelector(".toast");
  if(!t){ t=document.createElement("div"); t.className="toast"; document.body.appendChild(t); }
  t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2200);
}
function copyText(txt){
  const t = String(txt==null?"":txt);
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(()=>toast("Kopiert")).catch(()=>fallbackCopy(t));
  }else fallbackCopy(t);
}
function fallbackCopy(t){
  const ta=document.createElement("textarea"); ta.value=t; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand("copy"); toast("Kopiert"); }catch(e){ toast("Kopieren nicht möglich"); }
  ta.remove();
}
const LANGUA_WEB = "https://languatalk.com";
function openLangua(){
  const u = (state.settings.languaUrl||"").trim();
  // Kein App-Link gesetzt oder normaler Web-/Universal-Link → im Browser öffnen
  if(!u || /^https?:/i.test(u)){ window.open(u||LANGUA_WEB, "_blank", "noopener"); return; }
  // Custom-Schema (z. B. langua://) → App versuchen, sonst auf Website zurückfallen
  let switched=false;
  const onHide=()=>{ switched=true; };
  document.addEventListener("visibilitychange", onHide, {once:true});
  setTimeout(()=>{
    document.removeEventListener("visibilitychange", onHide);
    if(!switched && !document.hidden) window.open(LANGUA_WEB, "_blank", "noopener");
  }, 1400);
  try{ window.location.href = u; }catch(e){ window.open(LANGUA_WEB, "_blank", "noopener"); }
}

function parseJSON(text){
  let t = String(text||"").trim();
  t = t.replace(/^```(json)?/i,"").replace(/```$/,"").trim();
  return JSON.parse(t);
}
function extractObjects(text){
  const out=[]; let depth=0, start=-1;
  const s = String(text||"");
  for(let i=0;i<s.length;i++){
    const ch=s[i];
    if(ch==="{"){ if(depth===0) start=i; depth++; }
    else if(ch==="}"){ depth--; if(depth===0 && start>=0){ try{ out.push(JSON.parse(s.slice(start,i+1))); }catch(e){} start=-1; } }
  }
  return out;
}

/* =========================================================
   KI-Aufruf (über den Cloudflare-Worker / Anthropic-API)
   ========================================================= */
async function callAI(system, messages, opts={}){
  const endpoint = (state.settings.endpoint||"").trim() || "https://api.anthropic.com/v1/messages";
  const body = {
    model: (state.settings.model||"claude-sonnet-4-6").trim(),
    max_tokens: opts.maxTokens || 2000,
    system,
    messages
  };
  const res = await fetch(endpoint, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(body)
  });
  if(!res.ok){
    if(res.status===401) throw new Error("Kein Zugriff (401) — Worker-Endpoint in den Einstellungen prüfen");
    if(res.status===429) throw new Error("Zu viele Anfragen (429) — kurz warten");
    throw new Error("Serverfehler "+res.status);
  }
  const data = await res.json();
  const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
  if(!text) throw new Error("Leere Antwort");
  return text;
}
async function callAIRetry(system, messages, opts={}){
  let last;
  for(let a=0;a<3;a++){
    if(a) await sleep(600*a + Math.floor(Math.random()*300));
    try{ return await callAI(system, messages, opts); }catch(e){ last=e; }
  }
  throw last;
}

/* =========================================================
   Lehrplan (fest hinterlegt) — Module → Lektionen
   Tupel: [Titel, Thema/Situation, Kann-Ziel, Grammatik-Fokus]
   ========================================================= */
const CURRICULUM = {
  fr: [
    ["Erste Kontakte", [
      ["Begrüßung & Verabschiedung","sich begrüßen und verabschieden","Kann jemanden begrüßen und sich verabschieden","être, höfliche Floskeln",["Begrüßungsformeln","Verabschiedung","Tageszeiten","Höflichkeit (s'il vous plaît, merci)"]],
      ["Sich vorstellen","Name, Herkunft, Beruf nennen","Kann sich kurz vorstellen","s'appeler, venir de, Präsens",["Name & Buchstabieren","Herkunftsländer","Berufe","Sprachen"]],
      ["Zahlen & Kontaktdaten","Alter, Telefonnummer, E-Mail","Kann Zahlen und Kontaktdaten nennen","Zahlen 0–100, avoir (l'âge)",["Zahlen 0–100","Alter","Telefon & E-Mail","Adresse"]],
      ["Höflicher Smalltalk","bitte/danke, wie geht's","Kann höflich Smalltalk führen","Fragen mit est-ce que",["Befinden (ça va)","Höflichkeitsfloskeln","Dank & Entschuldigung","Abschiedswünsche"]],
    ]],
    ["Im Café & Essen", [
      ["Im Café bestellen","ein Getränk/Snack bestellen","Kann im Café bestellen","je voudrais, Teilungsartikel (du/de la)",["Heißgetränke","Kaltgetränke","Snacks & Gebäck","Bestellfloskeln"]],
      ["Im Restaurant","Speisekarte, bestellen, zahlen","Kann im Restaurant bestellen und zahlen","prendre/vouloir, l'addition",["Vor-/Haupt-/Nachspeise","Geschirr & Besteck","Bestellen","Bezahlen & Trinkgeld"]],
      ["Lebensmittel einkaufen","Mengen und Preise","Kann Lebensmittel einkaufen","combien, Mengenangaben",["Obst & Gemüse","Mengen & Verpackungen","Preise","Geschäfte"]],
      ["Über Essen sprechen","mögen / nicht mögen","Kann Vorlieben beim Essen ausdrücken","aimer/adorer/détester + Nomen",["Geschmack","Vorlieben & Abneigungen","Mahlzeiten","Allergien & Diät"]],
    ]],
    ["Orientierung & Wege", [

let _modCache = {};
function getModules(code){
  if(_modCache[code]) return _modCache[code];
  const mods = (CURRICULUM[code]||[]).map((m,mi)=>({
    name: m[0],
    units: m[1].map((u,ui)=>({
      id: code+"-"+mi+"-"+ui, module:m[0],
      title:u[0], theme:u[1], can_do:u[2], grammar:u[3]
    }))
  }));
  _modCache[code] = mods;
  return mods;
}
function registerPhrase(){
  const k = registerKey();
  if(k==="neutral") return "in natürlicher Standardsprache";
  if(k==="locker")  return "sehr umgangssprachlich, wie unter Freunden";
  return "in lockerer, natürlicher Alltagssprache";
}
function buildLanguaPrompt(code, unit){
  const l = L(code);
  return `Lass uns auf ${l.aiName} üben (mein Niveau: ${l.level}).
Thema: ${unit.theme}. Ziel: ${unit.can_do}.
Mach bitte ein realistisches Rollenspiel bzw. Gespräch dazu und bring typische Alltagswörter und Wendungen zu diesem Thema ein.
Übe gezielt diesen Grammatik-Fokus mit mir: ${unit.grammar}.
Sprich ${registerPhrase()}, korrigiere meine Fehler kurz und stell mir Rückfragen.`;
}
function buildBrief(code, unit){
  return {
    prompt: buildLanguaPrompt(code, unit),
    grammar: unit.grammar,
    success: [
      "Ich kann das Thema 2–3 Minuten am Stück bestreiten.",
      "Ich wende den Grammatik-Fokus ("+unit.grammar+") mehrmals korrekt an.",
      "Ich habe neue Wörter in Langua gespeichert."
    ]
  };
}

/* =========================================================
   LERNPFAD A1–C2 — eine Station pro Wortschatz-Kategorie
   (Kategorie = Station mit Grammatik-Fokus; Vokabel-Häkchen
   sind dieselben wie im Wortschatz-Tool)
   ========================================================= */
let _stCache=null;
function stations(){
  if(_stCache) return _stCache;
  _stCache = VOCAB_TAXONOMY.map((cat,ci)=>({
    ci, level:cat.lv, title:cat.c, theme:cat.c,
    can_do:"Kann über „"+cat.c+"“ sprechen und den Wortschatz dazu anwenden",
    grammar:cat.gr||"", vocab:cat.t
  }));
  return _stCache;
}
function stationAt(ci){ return stations()[ci]; }
function lessonId(code,ci){ return code+"-pl-"+ci; }
/* Vokabel-Häkchen nutzen dieselbe ID wie das Wortschatz-Tool: vocabId(code,ci,k) */
function stationDone(code,ci){
  if(!unitDone(code,lessonId(code,ci))) return false;
  const v=stationAt(ci).vocab;
  for(let k=0;k<v.length;k++) if(!unitDone(code,vocabId(code,ci,k))) return false;
  return true;
}
function stationVocabDone(code,ci){
  const v=stationAt(ci).vocab; let d=0;
  for(let k=0;k<v.length;k++) if(unitDone(code,vocabId(code,ci,k))) d++;
  return d;
}
function stationUnlocked(code,ci){ if(state.settings.preview) return true; if(ci<=0) return true; return stationDone(code,ci-1); }
function nextStation(code){
  const arr=stations();
  for(let ci=0;ci<arr.length;ci++){ if(!stationDone(code,ci) && stationUnlocked(code,ci)) return arr[ci]; }
  return null;
}
function pathProgress(code){
  const arr=stations(); let done=0;
  arr.forEach(s=>{ if(stationDone(code,s.ci)) done++; });
  return { total:arr.length, done };
}
function levelStations(level){ return stations().filter(s=>s.level===level); }
function levelDone(code, level){ return levelStations(level).every(s=>stationDone(code,s.ci)); }
function isLastOfLevel(ci){ const arr=stations(); return ci===arr.length-1 || arr[ci+1].level!==arr[ci].level; }
function markStationComplete(code,ci){
  state.langs[code].progress[lessonId(code,ci)]="done";
  stationAt(ci).vocab.forEach((_,k)=>{ state.langs[code].progress[vocabId(code,ci,k)]="done"; });
}
function applyPlacement(code, level){
  const ti=CEFR.indexOf(level);
  stations().forEach(s=>{ if(CEFR.indexOf(s.level)<ti) markStationComplete(code,s.ci); });
  state.langs[code].level=level; state.langs[code].placed=true;
  saveState();
}
function setPart(code,id,done){
  if(done){ if(!unitDone(code,id)) recordSessionDone(code,id); }
  else { state.langs[code].progress[id]=undefined; saveState(); }
}

/* =========================================================
   Tracking / Streak
   ========================================================= */
function routineFocusForDate(t){
  const r = state.routine;
  const langs = (r.langs&&r.langs.length)? r.langs : Object.keys(LANG_CONFIG);
  if(r.focusMode && r.focusMode!=="rotate" && langs.includes(r.focusMode)) return r.focusMode;
  const epochDay = Math.floor(dateFromStr(t).getTime()/86400000);
  return langs[((epochDay % langs.length)+langs.length)%langs.length];
}
function ensureToday(){
  const t = todayStr();
  if(!state.daily || state.daily.date!==t){
    if(state.daily && state.daily.date) state.history[state.daily.date] = { done:!!state.daily.done, sessions:state.daily.sessions||0 };
    state.daily = { date:t, focus:routineFocusForDate(t), done:false, sessions:0 };
    saveState();
  }
  return state.daily;
}
function updateStreak(){
  const s=state.streak, t=state.daily.date;
  if(s.lastDate===t) return;
  const yest = todayStr(new Date(Date.now()-86400000));
  s.current = (s.lastDate===yest)? s.current+1 : 1;
  s.lastDate=t; s.longest=Math.max(s.longest||0,s.current);
}
function recordSessionDone(code, unitId){
  ensureToday();
  state.langs[code].progress[unitId] = "done";
  state.daily.sessions += 1;
  if(!state.daily.done){ state.daily.done=true; updateStreak(); }
  saveState();
}
function unitDone(code, unitId){ return state.langs[code].progress[unitId]==="done"; }
function findUnit(code, id){
  for(const m of getModules(code)){ const u=m.units.find(x=>x.id===id); if(u) return u; }
  return (state.langs[code].custom||[]).find(x=>x.id===id) || null;
}
function langProgress(code){ return pathProgress(code); }

function weekDates(){
  const now=new Date(), dow=(now.getDay()+6)%7, mon=new Date(now); mon.setDate(now.getDate()-dow);
  const out=[]; for(let i=0;i<7;i++){ const d=new Date(mon); d.setDate(mon.getDate()+i); out.push(todayStr(d)); }
  return out;
}
function nextUnit(code){
  for(const m of getModules(code)){
    for(const u of m.units){ if(!unitDone(code,u.id)) return { unit:u }; }
  }
  return null;
}

  const d = ensureToday();
  const focus = d.focus;
  const wk=weekDates(), t=d.date, lbl=["M","D","M","D","F","S","S"];

    const h=state.history[ds]; const met = ds===t? d.done : (h&&h.done);
    return `<div class="wd ${met?'met':''} ${ds===t?'today':''}"><i></i><span>${lbl[i]}</span></div>`;
  }).join("");

  const fl = LANG_CONFIG[focus];

      focusCard = `<div class="card"><div class="tk-t">${fl.flag} ${fl.name}</div><p class="hint" style="margin-top:6px">Pfad abgeschlossen 🎉</p></div>`;
    }
  }

  const others = (state.routine.langs||Object.keys(LANG_CONFIG)).filter(c=>c!==focus);

function renderPathHTML(code){
  const arr=stations();
  let html=""; let curLevel=null;
  arr.forEach((s,idx)=>{
    if(s.level!==curLevel){
      curLevel=s.level;
      const lvl=levelStations(s.level);
      const dn=lvl.filter(x=>stationDone(code,x.ci)).length;
      html += `<button class="lvl-band" style="width:100%;background:none;border:none;cursor:pointer;text-align:left" onclick="go('levelinfo',{lang:'${code}',level:'${s.level}'})"><span class="lvl-chip">${s.level}</span><span class="lvl-meta">${dn}/${lvl.length}</span><span class="lvl-line"></span><span style="color:var(--ink-faint);font-size:13px">Kann-Beschreibungen ›</span></button>`;
    }
    const done=stationDone(code,s.ci);
    const unlocked=stationUnlocked(code,s.ci);
    const active=unlocked && !done;
    const cls = done?"done":(unlocked?(active?"active":""):"locked");
    const tag = done?"✓":(unlocked? "▸" : "🔒");
    const onclick = unlocked? `onclick="openStation('${code}',${s.ci})"` : "";
    const el = unlocked? "button" : "div";
    const vd=stationVocabDone(code,s.ci);
    html += `<${el} class="pstation ${cls}" ${onclick}>
      <div class="prail"><div class="pnode">${tag}</div></div>
      <div class="pcard">
        <div class="pc-t">${esc(s.title)}${active?' <span class="chip" style="font-size:10px;padding:1px 8px;vertical-align:middle">Weiter hier</span>':''}</div>

function cefrChecked(code,level,skill){ const c=state.langs[code].cefr||{}; return !!(c[level]&&c[level][skill]); }
function toggleCefr(code,level,skill){
  state.langs[code].cefr = state.langs[code].cefr||{};

function renderLevelInfo(){

/* =========================================================
   EINSTUFUNGSTEST (A1–C2)
   ========================================================= */
let placeT = null;
const SELF_DESC = {
  A1:"Einzelne Wörter und einfachste Sätze, sich vorstellen.",
  A2:"Einfache Alltagssituationen, kurze Routinegespräche.",
  B1:"Zusammenhängend über vertraute Themen sprechen, Meinung äußern.",
  B2:"Fließend diskutieren, komplexere Themen, kaum Anstrengung.",
  C1:"Spontan und flexibel, auch anspruchsvolle/abstrakte Themen.",
  C2:"Müheloses, präzises, nuanciertes Verständnis und Ausdruck."
};
function renderPlacement(){
  const code=view.lang, l=L(code);
  if(view.self){ renderSelfAssess(code); return; }
  if(placeT && placeT.code===code && placeT.questions){
    if(placeT.submitted) renderPlacementResult(); else renderPlacementQuestions();
    return;
  }
  app().innerHTML = `
    <button class="back" onclick="go('lang',{lang:'${code}'})">‹ Zurück</button>
    <h1 class="page-title">Einstufungstest</h1>
    <p class="page-sub">${l.flag} ${l.name} · A1 bis C2</p>
    <div class="card">
      <p style="margin:0 0 12px">Rund 30 Aufgaben (5 pro Niveau A1–C2) zu Grammatik, Wortschatz und Leseverständnis, mit steigender Schwierigkeit. Danach startet dein Pfad an der passenden Station.</p>
      <button class="btn" onclick="startPlacement('${code}')">Test starten</button>
      <button class="btn ghost sm" style="margin-top:10px;width:auto" onclick="go('placement',{lang:'${code}',self:1})">Lieber selbst einschätzen</button>
      <p class="hint" style="margin:12px 0 0">Der Test wird per KI erstellt — dafür muss die KI-Verbindung in den Einstellungen funktionieren. Ohne KI: „Selbst einschätzen".</p>
    </div>
  `;
}
async function startPlacement(code){
  const l=L(code);
  app().innerHTML=loadingHTML("Einstufungstest wird erstellt … (0/6)");
  const results=await runPool(CEFR, 3, async(lv)=>{
    const reading = (lv==="A1") ? "" : " sowie 1 Leseverständnis (2–3 Sätze kurzer Text + Frage dazu)";
    const sys="Du erstellst Einstufungsaufgaben. Antworte AUSSCHLIESSLICH mit einem gültigen JSON-Array, ohne Markdown.";
    const usr=`Sprache: ${l.aiName}. Niveau: ${lv} (GER-Skala). Erstelle 5 Multiple-Choice-Aufgaben exakt auf ${lv}-Niveau, die typische Schwierigkeiten dieses Niveaus prüfen: Grammatik und Wortschatz${reading}. JSON-Array, jedes Objekt: {"type":"Grammatik|Wortschatz|Leseverständnis","context":"<nur bei Leseverständnis ein kurzer Text in ${l.aiName}, sonst leerer String>","q":"<Aufgabe/Lückensatz/Frage in ${l.aiName}>","options":["A","B","C","D"],"answer":<Index 0-3 der einzig richtigen Option>}. Genau eine Option ist eindeutig richtig.`;
    let last;
    for(let a=0;a<4;a++){
      if(a) await sleep(500*a+Math.floor(Math.random()*300));
      try{
        const txt=await callAI(sys,[{role:"user",content:usr}],{maxTokens:2000});
        let arr; try{ arr=parseJSON(txt); }catch(e){ arr=extractObjects(txt); }
        const items=(arr||[]).filter(o=>o&&o.q&&Array.isArray(o.options)&&o.options.length>=2&&typeof o.answer==="number")
          .map(o=>({ level:lv, type:String(o.type||"Grammatik"), context:String(o.context||""), q:String(o.q), options:o.options.map(String), answer:o.answer }));
        if(items.length) return items;
        last=new Error("leer");
      }catch(e){ last=e; }
    }
    return [];
  }, (dn,tt)=>{ const el=app().querySelector(".loading div:last-child"); if(el) el.textContent=`Einstufungstest wird erstellt … (${dn}/${tt})`; });
  let qs=[]; results.forEach(r=>{ if(Array.isArray(r)) qs=qs.concat(r); });
  if(qs.length<8){
    app().innerHTML=`<button class="back" onclick="go('placement',{lang:'${code}'})">‹ Zurück</button><div class="err">Der Test konnte nicht erstellt werden. Prüfe die KI-Verbindung.</div>
      <button class="btn soft" style="margin-top:10px" onclick="startPlacement('${code}')">Erneut</button>
      <button class="btn ghost" style="margin-top:8px" onclick="go('placement',{lang:'${code}',self:1})">Selbst einschätzen</button>`;
    return;
  }
  placeT={ code, questions:qs, answers:new Array(qs.length).fill(-1), submitted:false };
  renderPlacementQuestions();
}
function renderPlacementQuestions(){
  const code=placeT.code, l=L(code);
  let curLevel=null;
  const cards=placeT.questions.map((q,i)=>{
    let head="";
    if(q.level!==curLevel){ curLevel=q.level; head=`<div class="lvl-band"><span class="lvl-chip">${q.level}</span><span class="lvl-line"></span></div>`; }
    const ctx=q.context?`<div class="brief-prompt" style="margin-bottom:10px">${esc(q.context)}</div>`:"";
    const opts=q.options.map((o,j)=>`<button class="q-opt ${placeT.answers[i]===j?'sel':''}" onclick="selectAnswer(${i},${j})">${esc(o)}</button>`).join("");
    return `${head}<div class="q-card" id="q${i}"><div class="q-txt">${i+1}. ${esc(q.q)} <span style="color:var(--ink-faint);font-weight:400">(${esc(q.type||q.level)})</span></div>${ctx}${opts}</div>`;
  }).join("");
  const answered=placeT.answers.filter(a=>a>=0).length;
  app().innerHTML=`
    <button class="back" onclick="abortPlacement('${code}')">‹ Abbrechen</button>
    <h1 class="page-title">Einstufungstest</h1>
    <p class="page-sub">${l.flag} ${l.name} · ${answered}/${placeT.questions.length} beantwortet</p>
    <p class="hint" style="margin:-8px 0 14px">Beantworte so viel du sicher kannst. Wenn du nichts mehr verstehst, ist das dein Niveau — du musst nicht raten.</p>
    ${cards}
    <button class="btn" id="subBtn" ${answered<placeT.questions.length?'disabled style="opacity:.5"':''} onclick="scorePlacement()">Auswerten</button>
    <div style="height:24px"></div>
  `;
}
function selectAnswer(i,j){
  placeT.answers[i]=j;
  const cont=document.getElementById("q"+i);
  if(cont){ cont.querySelectorAll(".q-opt").forEach((b,idx)=>b.classList.toggle("sel",idx===j)); }
  const answered=placeT.answers.filter(a=>a>=0).length;
  const sub=document.getElementById("subBtn");
  const subtitle=document.querySelector(".page-sub");
  if(subtitle) subtitle.textContent=`${L(placeT.code).flag} ${L(placeT.code).name} · ${answered}/${placeT.questions.length} beantwortet`;
  if(sub && answered>=placeT.questions.length){ sub.removeAttribute("disabled"); sub.style.opacity=""; }
}
function abortPlacement(code){ placeT=null; go("lang",{lang:code}); }
function scorePlacement(){
  const byLevel={};
  placeT.questions.forEach((q,i)=>{
    byLevel[q.level]=byLevel[q.level]||{c:0,t:0};
    byLevel[q.level].t++;
    if(placeT.answers[i]===q.answer) byLevel[q.level].c++;
  });
  let recommended="A1";
  for(const lv of CEFR){
    const b=byLevel[lv];
    if(!b) continue;
    if(b.c/b.t >= 0.6) recommended=lv; else break;
  }
  placeT.submitted=true; placeT.result=recommended; placeT.byLevel=byLevel;
  renderPlacementResult();
}
function renderPlacementResult(){
  const code=placeT.code, l=L(code), rec=placeT.result;
  const correct=placeT.questions.reduce((n,q,i)=>n+(placeT.answers[i]===q.answer?1:0),0);
  const breakdown=CEFR.filter(lv=>placeT.byLevel[lv]).map(lv=>{
    const b=placeT.byLevel[lv], ratio=b.c/b.t, pass=ratio>=0.6;
    return `<div class="word"><b>${lv}</b><span>${b.c}/${b.t} ${pass?'✓':''}</span></div>`;
  }).join("");
  const levelBtns=CEFR.map(lv=>`<button class="q-opt ${lv===rec?'sel':''}" onclick="choosePlacement('${lv}')">${lv} — ${SELF_DESC[lv]}</button>`).join("");
  app().innerHTML=`
    <button class="back" onclick="go('lang',{lang:'${code}'})">‹ Zurück</button>
    <h1 class="page-title">Dein Ergebnis</h1>
    <p class="page-sub">${l.flag} ${l.name} · ${correct}/${placeT.questions.length} richtig</p>
    <div class="card" style="border-color:var(--ink)">
      <div class="pc-t" style="font-size:18px">Empfohlenes Niveau: ${rec}</div>
      <p class="hint" style="margin:6px 0 12px">${SELF_DESC[rec]}</p>
      <button class="btn" onclick="choosePlacement('${rec}')">Pfad ab ${rec} starten</button>
    </div>
    <p class="eyebrow" style="margin-top:18px">Ergebnis pro Niveau</p>
    <div class="card">${breakdown}</div>
    <p class="eyebrow" style="margin-top:18px">Oder anderes Niveau wählen</p>
    ${levelBtns}
  `;
}
function choosePlacement(level){
  const code=placeT? placeT.code : view.lang;
  applyPlacement(code, level);
  placeT=null;
  toast("Eingestuft: "+level+" — Station freigeschaltet");
  go("lang",{lang:code, focusStation:true});
}
function renderSelfAssess(code){
  const l=L(code);
  const btns=CEFR.map(lv=>`<button class="q-opt" onclick="choosePlacementSelf('${code}','${lv}')">${lv} — ${SELF_DESC[lv]}</button>`).join("");
  app().innerHTML=`
    <button class="back" onclick="go('placement',{lang:'${code}'})">‹ Zurück</button>
    <h1 class="page-title">Selbst einschätzen</h1>
    <p class="page-sub">${l.flag} ${l.name} · Wähle dein Niveau</p>
    ${btns}
    <p class="hint" style="margin-top:12px">Du kannst später jederzeit neu einstufen (Einstellungen).</p>
  `;
}
function choosePlacementSelf(code,level){ applyPlacement(code,level); toast("Eingestuft: "+level+" — Station freigeschaltet"); go("lang",{lang:code, focusStation:true}); }
function replaceLevel(code){ placeT=null; go("placement",{lang:code}); }

let songRT = null;
function resetSong(){ songRT=null; renderSong(); }
function renderSong(){
  const code=view.lang, l=L(code);
  const have = songRT && songRT.code===code && songRT.segments;
  let body;
  if(!have){

      <button class="btn" style="margin-top:14px" onclick="analyzeSong()">Text analysieren</button>
      <p class="hint" style="margin-top:10px">Auch lange Lieder werden vollständig analysiert (automatisch in Abschnitte zerlegt, Refrains zusammengefasst).</p>`;
  }else{
    const segs = songRT.segments.map(s=>`
      <div class="card song-seg">

        ${s.de?`<div class="song-de">${esc(s.de)}</div>`:""}
        ${(s.vocab&&s.vocab.length)?`<div class="song-vocab">${s.vocab.map(v=>`<div class="word"><b>${esc(v.term)}</b><span>${esc(v.de||"")}</span></div>`).join("")}</div>`:""}
        ${s.grammar?`<div class="song-gram"><b>Grammatik</b> ${esc(s.grammar)}</div>`:""}
        ${s.context?`<div class="song-context"><b>Im Kontext</b> ${esc(s.context)}</div>`:""}
      </div>`).join("");
    body = `
      ${songRT.title?`<p class="page-sub">${esc(songRT.title)}</p>`:""}
      ${songRT.summary?`<div class="card"><h3>Worum geht es?</h3><p style="margin:6px 0 0;color:var(--ink-soft);line-height:1.5">${esc(songRT.summary)}</p></div>`:""}
      ${segs}
      <button class="btn ghost" style="margin-top:12px" onclick="resetSong()">Anderen Text analysieren</button>`;
  }
  app().innerHTML = `
    <button class="back" onclick="go('lang',{lang:'${code}'})">‹ ${esc(l.name)}</button>
    <h1 class="page-title">${l.flag} Songtext</h1>
    ${body}`;
}
function chunkLyrics(text){
  let lines = text.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
  const seen=new Set(), uniq=[];
  for(const ln of lines){ const k=ln.toLowerCase(); if(!seen.has(k)){ seen.add(k); uniq.push(ln); } }
  lines = uniq;
  if(lines.length<2 && text.length>80){
    const words=text.split(/\s+/); lines=[]; let cur="";
    for(const w of words){ if((cur+" "+w).trim().length>55){ lines.push(cur.trim()); cur=w; } else cur+=" "+w; }
    if(cur.trim()) lines.push(cur.trim());
  }
  const per=7, chunks=[];
  for(let i=0;i<lines.length;i+=per) chunks.push(lines.slice(i,i+per).join("\n"));
  return chunks.slice(0,16);
}
async function runPool(items, limit, worker, onProgress){
  const results=new Array(items.length); let idx=0, done=0;
  async function next(){
    const i=idx++; if(i>=items.length) return;
    try{ results[i]=await worker(items[i],i); }catch(e){ results[i]=null; }
    done++; if(onProgress) onProgress(done, items.length);
    return next();
  }
  const runners=[]; for(let k=0;k<Math.min(limit,items.length);k++) runners.push(next());
  await Promise.all(runners);
  return results;
}
async function analyzeSong(){
  const code=view.lang, l=LANG_CONFIG[code];
  const text=(document.getElementById("songText").value||"").trim();
  const title=(document.getElementById("songTitle").value||"").trim();
  if(text.length<10){ toast("Bitte Songtext einfügen"); return; }
  const chunks=chunkLyrics(text);
  const sysSeg="Du bist Sprachlehrer:in und analysierst einen bereitgestellten Liedtext-Abschnitt. Antworte AUSSCHLIESSLICH mit einem gültigen JSON-Array, ohne Markdown.";
  const usrSeg=(chunk)=>`Sprache: ${l.aiName}. Niveau: ${l.level}. Analysiere die folgenden Liedzeilen Zeile für Zeile für das Sprachenlernen.
JSON-Array von Objekten, je {"line":"<Originalzeile>","de":"<Übersetzung>","vocab":[{"term":"...","de":"..."}],"grammar":"<knappe Form/Struktur, sonst leer>","context":"<Erklärung auf Deutsch: Bedeutung im Kontext und wie Vokabeln & Grammatik zusammenwirken — inkl. Redewendungen, Bildsprache, Register>"}.
${ALLTAG}

Zeilen:
${chunk}`;
  app().innerHTML=loadingHTML(`Analysiere den Songtext … (0/${chunks.length})`);
  const summaryP=(async()=>{ try{
    const s=await callAI("Du fasst Liedtexte für Sprachlernende zusammen. Antworte nur mit der Zusammenfassung.",
      [{role:"user",content:`Fasse in 2-4 deutschen Sätzen zusammen, worum es in diesem ${l.aiName}-Liedtext geht: Thema, Stimmung, Aussage.\n\n${text.slice(0,2200)}`}],{maxTokens:400});
    return (s||"").replace(/```/g,"").trim();
  }catch(e){ return ""; } })();
  const segResults=await runPool(chunks,3, async(chunk)=>{
    let last;
    for(let a=0;a<4;a++){
      if(a) await sleep(600*a+Math.floor(Math.random()*300));
      try{
        const txt=await callAI(sysSeg,[{role:"user",content:usrSeg(chunk)}],{maxTokens:3500});
        let arr; try{ const p=parseJSON(txt); arr=Array.isArray(p)?p:(p.segments||[]); }catch(e){ arr=extractObjects(txt); }
        const f=(arr||[]).filter(o=>o&&o.line); if(f.length) return f; last=new Error("leer");
      }catch(e){ last=e; }
    }
    throw last||new Error("fehlgeschlagen");
  }, (dn,tt)=>{ app().innerHTML=loadingHTML(`Analysiere den Songtext … (${dn}/${tt})`); });
  let allSegs=[], failed=0;
  segResults.forEach(r=>{ if(Array.isArray(r)) allSegs=allSegs.concat(r); else failed++; });
  if(!allSegs.length){ toast("Analyse fehlgeschlagen"); songRT=null; renderSong(); return; }
  const summary=await summaryP;
  songRT={ code, title, summary, segments:allSegs };
  renderSong();
  if(failed) toast(`${failed} Abschnitt(e) fehlten — erneut versuchen`);
}

const LISTEN_PRESETS = [100, 200, 300, 500, 800];

function buildListenPrompt(code, level, topic, words){
  const l = LANG_CONFIG[code];
  return `Schreibe einen zusammenhängenden Text auf ${l.aiName} zum Thema „${topic}“.
Niveau: ${level} (GER-Skala). Länge: ca. ${words} Wörter.
Stil: natürlich und gut hörbar (ich höre den Text unterwegs an), ${registerPhrase()}, als Fließtext in 2–4 Absätzen, ohne Überschriften und ohne Aufzählungen. Verwende alltagsnahen, idiomatischen Wortschatz, der zum Niveau ${level} passt.
Gib zuerst nur den Text aus. Liste danach unter „Wortschatz:“ 6–8 Schlüsselwörter mit deutscher Übersetzung.
Lies mir den Text anschließend mit der Vorlesefunktion vor.`;
}

function renderListen(){
  const code=view.lang, l=L(code);

  const langOpts = Object.keys(LANG_CONFIG).map(c=>`<option value="${c}" ${c===selLang?'selected':''}>${LANG_CONFIG[c].flag} ${LANG_CONFIG[c].name}</option>`).join("");

  const presetChips = LISTEN_PRESETS.map(n=>`<button type="button" onclick="setListenWords(${n})">${n}</button>`).join("");

  app().innerHTML = `
    <button class="back" onclick="go('lang',{lang:'${code}'})">‹ ${esc(l.name)}</button>
    <h1 class="page-title">Hören</h1>
    <p class="page-sub">Erzeuge einen Prompt für ChatGPT — dort Text generieren und vorlesen lassen.</p>

}
function setListenWords(n){

function toggleRoutineLang(c){
  const a=state.routine.langs, i=a.indexOf(c);
  if(i>=0){ if(a.length>1) a.splice(i,1); } else a.push(c);
  if(state.routine.focusMode!=="rotate" && !a.includes(state.routine.focusMode)) state.routine.focusMode="rotate";
  saveState(); renderSettings();
}
function setFocus(v){ state.routine.focusMode=v; saveState(); renderSettings(); }
function setLevel(c,lv){ state.langs[c].level=lv; saveState(); renderSettings(); }
function setRegister(k){ state.settings.register=k; applyRegister(); saveState(); renderSettings(); }
function saveConn(){ state.settings.endpoint=document.getElementById("setEndpoint").value.trim(); state.settings.model=document.getElementById("setModel").value.trim(); const lg=document.getElementById("setLangua"); if(lg) state.settings.languaUrl=lg.value.trim(); saveState(); toast("Gespeichert"); }
function exportData(){
  try{
    const blob=new Blob([JSON.stringify(state)],{type:"application/json"});
    const url=URL.createObjectURL(blob); const a=document.createElement("a");
    a.href=url; a.download="plan-backup-"+todayStr()+".json"; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000); toast("Exportiert");
  }catch(e){ toast("Export fehlgeschlagen"); }
}
function importData(ev){
  const f=ev.target.files&&ev.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ const o=JSON.parse(rd.result); if(!o||!o.langs) throw new Error("kein gültiges Backup"); if(!confirm("Daten ersetzen?")) return; state=migrate(o); saveState(); applyRegister(); toast("Importiert"); go("home"); }catch(e){ toast("Import fehlgeschlagen: "+e.message); } };
  rd.readAsText(f);
}
function resetAll(){ if(confirm("Alle Pläne und Fortschritte löschen?")){ localStorage.removeItem(STORE_KEY); state=defaultState(); toast("Zurückgesetzt"); go("home"); } }
